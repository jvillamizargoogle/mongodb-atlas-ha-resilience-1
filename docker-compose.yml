version: "3.9"

networks:
  atlas-demo:
    driver: bridge

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file: .env
    ports:
      - "3001:3001"
    networks:
      - atlas-demo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "8080:80"
    networks:
      - atlas-demo
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
